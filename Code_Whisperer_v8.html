<!DOCTYPE html>
<!-- v8.0 IMPROVEMENTS:
  - Enhanced ActiveCode layout with prominent next action box
  - Algorithm progress tracker with visual step indicators
  - Status pills showing key metrics (Epi timer, Cycle, counts)
  - Dynamic reminders with color-coded urgency
  - Role-based conditional rendering (leader/compressor/medication/airway/observer)
  - Auto-save of full run data to localStorage on debrief render
  - Always-visible Vasopressin button (no config check)
  - Post-ROSC checklist appears before debrief on "End Code"
  - Dark theme as default
-->

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-family:'Inter',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;font-feature-settings:'cv11','ss01'}
body{min-height:100vh;min-height:100dvh;overflow-x:hidden;transition:background .3s,color .3s}
#root{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh}
:root{
--bg-primary:#f8fafc;--bg-card:#ffffff;--bg-card-alt:#f1f5f9;--bg-elevated:#e2e8f0;
--border:#e2e8f0;--border-light:#cbd5e1;
--text-primary:#0f172a;--text-secondary:#475569;--text-muted:#94a3b8;
--red:#dc2626;--red-dim:#fee2e2;--red-light:#991b1b;
--blue:#2563eb;--blue-dim:#dbeafe;--blue-light:#1e40af;
--green:#16a34a;--green-dim:#dcfce7;--green-light:#166534;
--amber:#d97706;--amber-dim:#fef3c7;--amber-light:#92400e;
--purple:#7c3aed;--orange:#ea580c;
--radius-sm:8px;--radius-md:12px;--radius-lg:16px;
--overlay:rgba(0,0,0,.35);
}
[data-theme="dark"]{
--bg-primary:#090e1a;--bg-card:#111827;--bg-card-alt:#1a2236;--bg-elevated:#1e293b;
--border:#1e293b;--border-light:#2a3548;
--text-primary:#e8ecf2;--text-secondary:#8896ab;--text-muted:#586882;
--red:#dc2626;--red-dim:#7f1d1d;--red-light:#fca5a5;
--blue:#2563eb;--blue-dim:#1e3a5f;--blue-light:#93c5fd;
--green:#16a34a;--green-dim:#14532d;--green-light:#86efac;
--amber:#d97706;--amber-dim:#78350f;--amber-light:#fcd34d;
--purple:#7c3aed;--orange:#ea580c;
--overlay:rgba(0,0,0,.65);
}
body{background:var(--bg-primary);color:var(--text-primary)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes flash{0%,100%{box-shadow:none}50%{box-shadow:0 0 16px var(--red)}}
.fade-in{animation:fadeIn .25s ease-out}
.slide-up{animation:slideUp .25s ease-out}
.pulse{animation:pulse 1.2s ease-in-out infinite}
.flash{animation:flash .8s ease-in-out 3}
.btn{min-height:56px;font-size:14px;font-weight:700;border:none;border-radius:var(--radius-md);cursor:pointer;
display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 16px;
transition:transform 80ms,filter 80ms,box-shadow 80ms;-webkit-user-select:none;user-select:none;
letter-spacing:.01em;color:#fff;position:relative}
.btn:active{transform:scale(.97);filter:brightness(.9)}
.btn:disabled{opacity:.35;pointer-events:none}
.btn-sm{min-height:40px;font-size:13px;padding:10px 14px;border-radius:var(--radius-sm)}
.btn-group{display:flex;gap:4px}
.btn-group .btn{flex:1;min-height:44px;border-radius:var(--radius-sm)}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;transition:background .3s,border-color .3s}
.overlay{position:fixed;inset:0;background:var(--overlay);backdrop-filter:blur(3px);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
max-width:480px;width:100%;max-height:85vh;overflow-y:auto;padding:20px 18px 28px}
.track{height:5px;background:var(--bg-elevated);border-radius:3px;overflow:hidden}
.fill{height:100%;border-radius:3px;transition:width .5s linear}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;line-height:1.4}
.label{color:var(--text-muted);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.log-row{padding:8px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
.log-row:last-child{border-bottom:none}
.toggle{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;transition:background .2s}
.toggle-knob{width:18px;height:18px;border-radius:9px;background:#fff;position:absolute;top:3px;transition:left .2s}
.check-item{display:flex;align-items:center;gap:8px;padding:7px 0;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border)}
.check-item:last-child{border-bottom:none}
.check-box{width:18px;height:18px;border:2px solid var(--border-light);border-radius:4px;display:flex;align-items:center;
justify-content:center;flex-shrink:0;font-size:11px;transition:all .15s}
.check-box.checked{background:var(--green);border-color:var(--green);color:#fff}
.metric{background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;text-align:center;transition:background .3s}
.metric-val{font-size:24px;font-weight:800;color:var(--text-primary);font-variant-numeric:tabular-nums}
.metric-label{font-size:10px;color:var(--text-muted);font-weight:600;letter-spacing:.05em;margin-top:2px}
.score-ring{width:110px;height:110px;position:relative;margin:0 auto}
.score-ring svg{transform:rotate(-90deg)}
.score-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.algo-step{padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12px;
display:flex;align-items:center;gap:8px;margin-bottom:4px;transition:all .2s}
.algo-step.active{border-color:var(--green);background:rgba(22,163,74,.08)}
.algo-step.completed{border-color:var(--text-muted);color:var(--text-muted)}
.tl-bar{height:28px;border-radius:4px;position:relative;margin-bottom:3px;font-size:10px;font-weight:600;
display:flex;align-items:center;padding:0 8px;color:#fff;overflow:hidden;min-width:24px}
.tab-bar{display:flex;gap:2px;background:var(--bg-elevated);border-radius:var(--radius-sm);padding:2px}
.tab{flex:1;text-align:center;padding:8px 4px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;
color:var(--text-muted);transition:all .15s;border:none;background:none}
.tab.active{background:var(--bg-card);color:var(--text-primary);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.scen-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;cursor:pointer;
transition:border-color .15s,background .15s}
.scen-card:hover{border-color:var(--text-muted);background:var(--bg-card-alt)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.disclaimer-banner{background:var(--amber-dim);border:1px solid var(--amber-light);border-radius:var(--radius-md);padding:12px;margin-bottom:14px;display:flex;gap:8px}
.disclaimer-banner svg{flex-shrink:0;color:var(--amber-light)}
.disclaimer-banner-text{font-size:12px;color:var(--amber-light);font-weight:600}
.collapsible-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:12px;overflow:hidden}
.collapsible-panel-header{padding:12px;background:var(--bg-elevated);display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:600;color:var(--text-primary)}
.collapsible-panel-content{padding:12px;max-height:300px;overflow-y:auto}
.two-col-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
</style>
</head>

let actx=null;
function ctx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function tone(f,dur,type="sine",vol=.25){try{const c=ctx(),o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=f;g.gain.value=vol;g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+dur)}catch(e){}}
function sndClick(){tone(700,.04,"square",.12)}
function sndAlert(){tone(880,.12,"sine",.35);setTimeout(()=>tone(1100,.15,"sine",.35),150)}
function sndRhythm(){tone(660,.15,"sine",.4);setTimeout(()=>tone(880,.15,"sine",.4),170);setTimeout(()=>tone(1100,.2,"sine",.4),340)}
function haptic(ms=50){try{navigator.vibrate&&navigator.vibrate(ms)}catch(e){}}

function useMetronome(on,bpm){
const ref=useRef(null);
useEffect(()=>{
if(on){ref.current=setInterval(()=>tone(900,.025,"square",.1),60000/bpm)}
return()=>{if(ref.current)clearInterval(ref.current)};
},[on,bpm]);
}

function calcDose(drug,weightKg,ageGroup){
const w=weightKg;
if(ageGroup==="adult"){
const doses={
"Epinephrine":"1 mg IV/IO",
"Vasopressin":"40 units IV/IO",
"Amiodarone 1st":"300 mg IV/IO",
"Amiodarone 2nd":"150 mg IV/IO",
"Lidocaine 1st":`${w.toFixed(0)}–${(w*1.5).toFixed(0)} mg (1–1.5 mg/kg) IV/IO`,
"Lidocaine sub":`${(w*0.5).toFixed(0)}–${(w*0.75).toFixed(0)} mg (0.5–0.75 mg/kg) IV/IO`,
"Atropine":"1 mg IV (if bradycardia)",
"Sodium Bicarb":`${(w*1).toFixed(0)} mEq (1 mEq/kg) IV`,
"Calcium Chloride":"1–2 g (10% solution) IV slow",
"Magnesium Sulfate":"1–2 g IV (for torsades)",
"Defib Energy":"200 J biphasic (escalate per manufacturer)",
};
return doses[drug]||"See reference";
}
const doses={
"Epinephrine":`${(w*0.01).toFixed(3)} mg (0.01 mg/kg) IV/IO`,
"Vasopressin":"Not routinely recommended in pediatrics",
"Amiodarone 1st":`${(w*5).toFixed(0)} mg (5 mg/kg) IV/IO, max 300 mg`,
"Amiodarone 2nd":`${(w*5).toFixed(0)} mg (5 mg/kg) IV/IO`,
"Lidocaine 1st":`${(w*1).toFixed(0)} mg (1 mg/kg) IV/IO`,
"Lidocaine sub":`${(w*1).toFixed(0)} mg (1 mg/kg) IV/IO q5–10 min`,
"Defib 1st":`${(w*2).toFixed(0)} J (2 J/kg)`,
"Defib 2nd":`${(w*4).toFixed(0)} J (4 J/kg)`,
"Defib max":`${Math.min(w*10,360).toFixed(0)} J (max 10 J/kg or adult dose)`,
"Sodium Bicarb":`${(w*1).toFixed(0)} mEq (1 mEq/kg) IV`,
"ETT Size":`${((w<10?(w/2+3.5):(w<30?(w/4+3.5):(w/4+4)))).toFixed(1)} mm`,
};
return doses[drug]||"See reference";
}

function ActiveCode({config,onEnd,onRosc}){
const[elapsed,setElapsed]=useState(0);
const[cycleT,setCycleT]=useState(CYCLE_SEC);
const[scn,setScn]=useState(config.scenario);
const[epiT,setEpiT]=useState(config.epiInterval);
const[cycle,setCycle]=useState(1);
const[epiN,setEpiN]=useState(0);
const[shockN,setShockN]=useState(0);
const[cprActive,setCprActive]=useState(true);
const[metOn,setMetOn]=useState(config.metronome);
const[log,setLog]=useState([{t:0,label:"Code started",detail:`${config.scenario==="SHOCKABLE"?"VF/pVT":"PEA/Asystole"} initiated`,type:"sys"}]);
const[hsTs,setHsTs]=useState(config.showHsTs);
const[hCheck,setHCheck]=useState({});
const[modal,setModal]=useState(null);
const[note,setNote]=useState("");
const[ended,setEnded]=useState(false);
const[ivx,setIvx]=useState({});
const[antiN,setAntiN]=useState(0);
const[vasoN,setVasoN]=useState(0);
const[cprTotalSec,setCprTotalSec]=useState(0);
const[firstShockT,setFirstShockT]=useState(null);
const[firstEpiT,setFirstEpiT]=useState(null);
const[epiTimes,setEpiTimes]=useState([]);
const[deviations,setDeviations]=useState([]);
const[epiGated,setEpiGated]=useState(config.scenario==="SHOCKABLE");
const[roscChecklist,setRoscChecklist]=useState({});
const[debTab,setDebTab]=useState("score");
const[guidanceMsg,setGuidanceMsg]=useState("");
const[hstExpanded,setHstExpanded]=useState(false);
const[intExpanded,setIntExpanded]=useState(false);
const[instructorNotes,setInstructorNotes]=useState("");

const timerRef=useRef(null);

useEffect(()=>{
if(ended)return;
timerRef.current=setInterval(()=>{
setElapsed(p=>p+1);
if(cprActive)setCprTotalSec(p=>p+1);
setCycleT(p=>{
if(p<=1){
if(config.audio)sndRhythm();
if(config.haptic)haptic(200);
setGuidanceMsg("Rhythm check - press button to check");
return CYCLE_SEC;
}
return p-1;
});
setEpiT(p=>{
if(p<=1&&!epiGated){if(config.audio)sndAlert();if(config.haptic)haptic(150);setGuidanceMsg("Epinephrine due — administer now");return config.epiInterval}
return epiGated?p:p-1;
});
},1000);
return()=>clearInterval(timerRef.current);
},[ended,config.audio,config.epiInterval,config.haptic,cprActive,epiGated]);

useMetronome(metOn&&!ended,MET_BPM);

const addLog=useCallback((label,detail,type="act")=>{
setLog(p=>[{t:elapsed,label,detail,type},...p]);
},[elapsed]);

const scnLabel=scn==="SHOCKABLE"?"VF / pVT":"PEA / Asystole";
const scnBg=scn==="SHOCKABLE"?"var(--red-dim)":"var(--blue-dim)";
const scnTxt=scn==="SHOCKABLE"?"var(--red-light)":"var(--blue-light)";
const showShock=scn==="SHOCKABLE";
const showAnti=scn==="SHOCKABLE";
const comprFrac=elapsed>0?Math.round((cprTotalSec/elapsed)*100):100;

const algoSteps=useMemo(()=>{
if(scn==="SHOCKABLE"){
return[
{label:"CPR 2 min",done:cycle>1||cycleT<CYCLE_SEC,active:cprActive&&cycle===1},
{label:"Rhythm check",done:cycle>1,active:!cprActive||cycleT<=5},
{label:"Shock if VF/pVT",done:shockN>0,active:cycle>=1&&shockN===0},
{label:"CPR 2 min",done:cycle>2,active:cycle===2},
{label:"Epinephrine q3-5 min",done:epiN>0,active:!epiGated&&epiN===0},
{label:"Shock if persistent VF/pVT",done:shockN>2,active:shockN>=1&&shockN<3},
{label:"Antiarrhythmic after 3rd shock",done:antiN>0,active:shockN>=3&&antiN===0},
{label:"Treat reversible causes",done:Object.keys(hCheck).length>=2,active:true},
];
}
return[
{label:"CPR 2 min",done:cycle>1||cycleT<CYCLE_SEC,active:cprActive&&cycle===1},
{label:"Epinephrine ASAP",done:epiN>0,active:epiN===0},
{label:"Rhythm check q2 min",done:cycle>1,active:!cprActive||cycleT<=5},
{label:"Continue CPR",done:cycle>2,active:cycle>=2},
{label:"Epinephrine q3-5 min",done:epiN>1,active:epiN>=1&&epiT<=30},
{label:"Treat reversible causes",done:Object.keys(hCheck).length>=2,active:true},
];
},[scn,cycle,cycleT,cprActive,shockN,epiN,epiGated,antiN,epiT,hCheck]);

function doShock(){
const n=shockN+1;setShockN(n);
const energy=config.age==="adult"?"200 J biphasic":
n===1?calcDose("Defib 1st",config.weight,"pediatric"):calcDose("Defib 2nd",config.weight,"pediatric");
addLog(`Shock #${n}`,`Defibrillation: ${energy}`,"shock");
if(firstShockT===null)setFirstShockT(elapsed);
if(config.audio)sndAlert();
if(config.haptic)haptic(200);
setGuidanceMsg("Resume CPR immediately");
}

function doEpi(){
const n=epiN+1;setEpiN(n);
const dose=calcDose("Epinephrine",config.weight,config.age);
addLog(`Epi #${n}`,`Epinephrine: ${dose}`,"drug");
setEpiTimes(p=>[...p,elapsed]);
if(n===1)setFirstEpiT(elapsed);
setEpiGated(scn==="SHOCKABLE"?false:epiGated);
if(config.audio)sndClick();
}

function doVaso(){
const n=vasoN+1;setVasoN(n);
addLog(`Vasopressin #${n}`,`Vasopressin: 40 units IV/IO`,"drug");
if(config.audio)sndClick();
}

function doAnti(drug){
const n=antiN+1;setAntiN(n);
const dose=calcDose(drug+" 1st",config.weight,config.age);
addLog(`${drug}`,`${drug}: ${dose}`,"drug");
if(config.audio)sndClick();
}

function doRhythmCheck(){
setCycle(p=>p+1);
setCycleT(CYCLE_SEC);
addLog("Rhythm check","Cycle "+cycle+" completed, rhythm reassessed","act");
}

function calcScore(){
const perf={score:0,notes:[]};
const timeToFirstShock=firstShockT||999;
const timeToFirstEpi=firstEpiT||999;

if(timeToFirstShock<300&&scn==="SHOCKABLE"){
perf.score+=15;
perf.notes.push({good:true,text:"Early defibrillation (<5 min)",ref:"defibrillation"});
}else if(scn==="SHOCKABLE"){
perf.score+=5;
perf.notes.push({bad:true,text:"Delayed defibrillation (>5 min)",ref:"defibrillation"});
}

if(timeToFirstEpi<120&&scn==="NON_SHOCKABLE"){
perf.score+=15;
perf.notes.push({good:true,text:"Early epinephrine for non-shockable (<2 min)",ref:"epinephrine"});
}else if(scn==="NON_SHOCKABLE"&&timeToFirstEpi>180){
perf.score+=5;
perf.notes.push({bad:true,text:"Delayed epinephrine (>3 min)",ref:"epinephrine"});
}

if(comprFrac>=70){
perf.score+=15;
perf.notes.push({good:true,text:"High compression fraction (≥70%)",ref:"cpr_quality"});
}else if(comprFrac>=60){
perf.score+=10;
perf.notes.push({text:"Adequate compression fraction (60–70%)",ref:"cpr_quality"});
}else{
perf.score+=5;
perf.notes.push({bad:true,text:"Low compression fraction (<60%)",ref:"cpr_quality"});
}

if(Object.keys(hCheck).length>=2){
perf.score+=15;
perf.notes.push({good:true,text:"Identified ≥2 reversible causes",ref:"reversible_causes"});
}else if(Object.keys(hCheck).length===1){
perf.score+=8;
perf.notes.push({text:"Identified 1 reversible cause",ref:"reversible_causes"});
}else{
perf.score+=3;
perf.notes.push({bad:true,text:"No reversible causes identified",ref:"reversible_causes"});
}

if(scn==="SHOCKABLE"){
if(antiN>0&&shockN>=3){
perf.score+=12;
perf.notes.push({good:true,text:"Antiarrhythmic given after 3rd shock",ref:"antiarrhythmic"});
}else if(shockN>=3){
perf.score+=4;
perf.notes.push({bad:true,text:"No antiarrhythmic after 3rd shock",ref:"antiarrhythmic"});
}else{
perf.score+=8;
perf.notes.push({text:"VF resolved before antiarrhythmic indicated"});
}
}else{
perf.score+=8;
}

if(cycle>=2){
perf.score+=10;
perf.notes.push({good:true,text:"Multiple CPR cycles completed",ref:"cpr_quality"});
}else{
perf.score+=3;
perf.notes.push({text:"Only 1 CPR cycle — consider longer resuscitation"});
}

if(epiN>=2){
const gaps=epiTimes.slice(1).map((t,i)=>t-epiTimes[i]);
const allGood=gaps.every(g=>g>=180&&g<=360);
if(allGood){
perf.score+=10;
perf.notes.push({good:true,text:"Epinephrine intervals within 3–5 min",ref:"epinephrine"});
}else{
perf.score+=5;
perf.notes.push({text:"Epinephrine intervals outside optimal range",ref:"epinephrine"});
}
}else if(epiN===1){
perf.score+=6;
perf.notes.push({text:"Only 1 epi dose given"});
}else{
perf.score+=2;
perf.notes.push({bad:true,text:"No epinephrine administered",ref:"epinephrine"});
}

const noteCount=log.filter(l=>l.type==="note").length;
if(noteCount>=2){
perf.score+=8;
perf.notes.push({good:true,text:"Good documentation",ref:"team_dynamics"});
}else if(noteCount>=1){
perf.score+=5;
perf.notes.push({text:"Some documentation present",ref:"team_dynamics"});
}else{
perf.score+=2;
perf.notes.push({bad:true,text:"No notes logged",ref:"team_dynamics"});
}

perf.score=Math.min(100,perf.score);
return perf;
}

if(ended&&modal==="debrief"){

const g=getGrade(perf.score);
const fullRunData={scenario:config.scenario,age:config.age,weight:config.weight,elapsed,cycle,shockN,epiN,comprFrac,antiN,roscChecklist,log,score:perf.score,notes:perf.notes,timestamp:new Date().toISOString()};

{/* ROSC / Post-ROSC Checklist Modal */}
<Modal open={modal==="rosc"} onClose={()=>setModal(null)} title="Post-ROSC Care Checklist">
<p style={{fontSize:12,color:'var(--text-muted)',marginBottom:12}}>Complete the post-ROSC care checklist before proceeding to debrief.</p>
{POST_ROSC.map(item=>(
<div key={item.id} style={{marginBottom:10}}>
<label style={{display:'flex',alignItems:'flex-start',gap:8,cursor:'pointer',fontSize:12}}>
<input type="checkbox" checked={roscChecklist[item.id]||false} onChange={e=>setRoscChecklist(p=>({...p,[item.id]:e.target.checked}))}
style={{marginTop:2}}/>
<div>
<div style={{fontWeight:600,color:'var(--text-primary)'}}>{item.label}</div>
<div style={{color:'var(--text-muted)',fontSize:11}}>{item.detail}</div>
</div>
</label>
</div>
))}
<button onClick={() => {setEnded(true); setModal("debrief")}} className="btn" style={{width:'100%',background:'var(--green)',marginTop:12}}>
View Full Debrief</button>
</Modal>

{/* Antiarrhythmic Selection Modal */}
<Modal open={modal==="anti"} onClose={()=>setModal(null)} title="Antiarrhythmic">
<p style={{fontSize:12,color:'var(--text-muted)',marginBottom:12}}>Select antiarrhythmic medication:</p>
{ANTI_DRUGS.map(d=>(
<button key={d.id} onClick={()=>{setAntiN(p=>p+1);addLog("Antiarrhythmic",`${d.label} - ${d.dose}`,"drug");setModal(null);sndClick()}} className="btn" style={{width:'100%',background:'var(--purple)',marginBottom:8}}>
<div style={{fontWeight:700}}>{d.label}</div>
<div style={{fontSize:10,opacity:0.85}}>{d.dose}</div>
</button>
))}
</Modal>

<Modal open={modal==="note"} onClose={()=>setModal(null)} title="Add Note">
<textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Type clinical note..."
style={{width:'100%',padding:'10px',border:'1px solid var(--border)',borderRadius:6,fontSize:12,background:'var(--bg-primary)',color:'var(--text-primary)',fontFamily:'Inter',minHeight:80,marginBottom:12}}/>
<button onClick={()=>{addLog("Note",note,"note");setNote("");setModal(null)}} className="btn" style={{width:'100%',background:'var(--blue)'}}>
Save Note</button>
</Modal>
</div>
);
}


function App(){
const[screen,setScreen]=useState("login");
const[user,setUser]=useState(null);
const[recent,setRecent]=useState([]);
const[setupScn,setSetupScn]=useState("SHOCKABLE");
const[cfg,setCfg]=useState(null);
const[theme,setTheme]=useState("dark");
const[branding,setBranding]=useState({institution:"",appName:"",logoUrl:"",barColor:"",metAudio:true,haptic:true,allowVaso:true});
const[role,setRole]=useState("leader");
const[scenPrefill,setScenPrefill]=useState(null);
const[lang,setLang]=useState("en");
const[instructorMode,setInstructorMode]=useState(false);
const[viewingRun,setViewingRun]=useState(null);

useEffect(()=>{
const saved=localStorage.getItem('cw_user_email');
if(saved){setUser({email:saved});setScreen("home")}
const rec=localStorage.getItem('cw_recent');
if(rec)try{setRecent(JSON.parse(rec))}catch(e){}
const th=localStorage.getItem('cw_theme');
if(th)setTheme(th);
const lg=localStorage.getItem('cw_lang');
if(lg)setLang(lg);
},[]);

useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);localStorage.setItem('cw_theme',theme)},[theme]);
useEffect(()=>{localStorage.setItem('cw_lang',lang)},[lang]);
useEffect(()=>{localStorage.setItem('cw_recent',JSON.stringify(recent))},[recent]);

if(viewingRun){
const perf={score:viewingRun.score,notes:[]};
const g=getGrade(viewingRun.score);
return(
<div style={{padding:'18px'}}>
<button onClick={()=>setViewingRun(null)} style={{background:'none',border:'none',color:'var(--text-primary)',fontSize:14,fontWeight:700,cursor:'pointer',marginBottom:16,display:'flex',alignItems:'center',gap:6}}>
<Icon name="arrowLeft" size={16}/>Back</button>
<h2 style={{fontSize:18,fontWeight:800,color:'var(--text-primary)',marginBottom:14}}>Past Code Review</h2>
<div className="card" style={{textAlign:'center',marginBottom:14}}>
<ScoreRing score={viewingRun.score} size={110}/>
<div style={{fontSize:16,fontWeight:800,color:g.color,marginTop:8}}>{g.label}</div>
</div>
<p className="label">Metrics</p>
<div className="grid2" style={{marginBottom:14}}>
<div className="metric"><div className="metric-val">{viewingRun.elapsed?fmt(viewingRun.elapsed):"-"}</div><div className="metric-label">Duration</div></div>
<div className="metric"><div className="metric-val">{viewingRun.cycle||"-"}</div><div className="metric-label">Cycles</div></div>
<div className="metric"><div className="metric-val">{viewingRun.shockN||0}</div><div className="metric-label">Shocks</div></div>
<div className="metric"><div className="metric-val">{viewingRun.epiN||0}</div><div className="metric-label">Epi</div></div>
</div>
<p className="label" style={{marginBottom:8}}>Event Timeline</p>
<div style={{maxHeight:300,overflowY:'auto'}}>
{viewingRun.log&&viewingRun.log.map((entry,i)=>(
<div key={i} className="log-row">
<div style={{fontSize:11,fontWeight:700,color:entry.type==="shock"?'var(--red)':entry.type==="drug"?'var(--amber)':'var(--blue)',minWidth:40}}>
{fmt(entry.t)}</div>
<div style={{flex:1}}>
<div style={{fontSize:12,fontWeight:600,color:'var(--text-primary)'}}>{entry.label}</div>
<div style={{fontSize:11,color:'var(--text-secondary)'}}>{entry.detail}</div>
</div>
</div>
))}
</div>
</div>
);
}

if(screen==="login"){
return <LoginScreen onLogin={(email)=>{setUser({email});setScreen("home")}}/>;
}

if(screen==="home"){
return <Home onSetup={(scn)=>{setSetupScn(scn);setScenPrefill(null);setScreen("setup")}} onScenario={()=>setScreen("scenarios")} onDoseCalc={()=>setScreen("dosecalc")} onSettings={()=>setScreen("settings")} onAbout={()=>setScreen("about")} user={user} onProfile={()=>setScreen("profile")} onLogout={()=>{localStorage.removeItem('cw_user_email');setUser(null);setScreen("login")}} recent={recent} branding={branding} theme={theme} setTheme={setTheme} lang={lang} setLang={setLang}/>;
}

if(screen==="profile"){
return <ProfileScreen onBack={()=>setScreen("home")} user={user} recent={recent} onViewRun={(fullData)=>setViewingRun(fullData)}/>;
}

if(screen==="about"){
return <AboutAndSources onBack={()=>setScreen("home")}/>;
}

if(screen==="scenarios"){
return <ScenarioPicker onBack={()=>setScreen("home")} onSelect={(s)=>{setScenPrefill(s);setScreen("setup")}}/>;
}

if(screen==="dosecalc"){
return <DoseCalcScreen onBack={()=>setScreen("home")}/>;
}

if(screen==="settings"){
return <SettingsScreen onBack={()=>setScreen("home")} branding={branding} setBranding={setBranding} theme={theme} setTheme={setTheme} role={role} setRole={setRole} instructorMode={instructorMode} setInstructorMode={setInstructorMode}/>;
}

if(screen==="setup"){
return <Setup scenario={setupScn} prefill={scenPrefill} branding={branding} onBack={()=>setScreen("home")} onStart={(config)=>{config.role=role;config.branding=branding;setCfg(config);setScreen("active")}}/>;
}

if(screen==="active"&&cfg){
return <ActiveCode config={cfg} onEnd={()=>{setScreen("home");setCfg(null)}}/>;
}

return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
